# Local dev stack: a pgvector database (memory + work-item store) + the Autopilot
# HTTP backend. Mirrors the CI service container and the production Alibaba Cloud
# PostgreSQL — same pg-wire, same pgvector SQL.
#
#   docker compose up -d db      # just the database (for `npm run db:schema` + tests)
#   docker compose up --build    # database + backend
#
# Local compose explicitly opts into deterministic Fakes when no key is supplied.
# Production does not use this file and fails closed without real Qwen + Postgres.
#
# SCOPE: this compose file is the self-contained LOCAL-DEV stack (its own throwaway
# pgvector on 5432, backend on 9000). The PRODUCTION deploy is DIFFERENT: on the
# shared Alibaba Cloud box the Autopilot REUSES the MemoryAgent's running pgvector
# (its own `autopilot` database) and is served on host port 9100 — done with
# `docker run` joined to the MemoryAgent's docker network, NOT this compose file, so
# this file stays clean for local dev. See deploy/redeploy.sh + deploy/DEPLOY_STATE.md.

services:
  db:
    image: pgvector/pgvector:0.8.5-pg16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - data

  migrate:
    build: .
    command: ["node", "dist/scripts/apply-schema.js"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - data

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      PORT: 9000
      # Real Qwen when DASHSCOPE_API_KEY is present (from the shell env or a .env
      # file next to this compose file); otherwise it resolves to empty and the
      # app falls back to the deterministic offline Fakes (src/qwen/client.ts
      # hasQwenCreds()). The `:-` defaults keep `docker compose config` valid even
      # when neither is set, so a fresh clone works with or without a key.
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      ALLOW_FAKE_QWEN: ${ALLOW_FAKE_QWEN:-true}
      REVIEWER_TOKEN: ${REVIEWER_TOKEN:-local-reviewer-token-change-me-123456}
      REVIEWER_NAME: ${REVIEWER_NAME:-local-reviewer}
      READY_REQUIRE_QWEN: ${READY_REQUIRE_QWEN:-false}
      READY_REQUIRE_DATABASE: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "127.0.0.1:9000:9000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - edge
      - data

volumes:
  pgdata:

networks:
  edge:
  data:
    internal: true
