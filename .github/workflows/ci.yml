name: CI

# Archon Autopilot CI — gitleaks-first, then dep-audit → typecheck → build → test.
# Application tests make no provider calls: with no DASHSCOPE_API_KEY the decider
# + embedder auto-fall back to deterministic Fakes (FakeQwenChatClient +
# FakeEmbedder), so the whole AP loop — intake → decide → HITL approve → execute —
# is exercised with no provider secret or spend. Dependency installation, the
# advisory audit, and the pinned gitleaks download still require ordinary CI
# network access. A pgvector service container backs the DB-integration tests.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Stage 1 — fail fast on any committed secret.
  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: gitleaks detect (pinned v8.18.4, redacted)
        run: |
          curl --fail --silent --show-error --location \
            --output gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          echo "ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d  gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --redact --no-banner

  # Stage 2a — registry-backed dependency vulnerability audit (parallel with tests).
  # High/critical advisories fail the job; low/moderate are reported, not blocking.
  dep-audit:
    needs: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  # Stage 2b — typecheck → build → the full testing pyramid.
  build-test:
    needs: secret-scan
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    services:
      pgvector:
        image: pgvector/pgvector:0.8.5-pg16-bookworm@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Promotion evidence verifies the historical source commit by ancestry.
          # A depth-1 checkout cannot prove that invariant and must not run it.
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (tsc)
        run: npm run --ignore-scripts build

      # This is a release contract, not a redundant compile: Docker's context
      # allowlist must contain every production bootstrap/runtime asset.
      - name: Build the exact production Docker image
        run: DOCKER_BUILDKIT=1 docker build --tag archon-qwen-autopilot:ci .

      - name: Apply schema (creates agent_memory vector(1024) + ap_workitems)
        run: npm run db:schema

      - name: Unit tests (no infra, no key)
        run: npm run test:unit

      - name: Integration tests (offline HTTP slice + real pgvector stores)
        run: npm run test:integration

      - name: End-to-end AP loop smoke (offline Fakes — no key)
        run: npm run demo

      - name: Frozen decision dataset integrity (offline — no key)
        run: npm run eval:dataset

      - name: Frozen vision fixture integrity (offline — no key, no model call)
        run: npm run eval:vision

      - name: Decision-quality eval (offline policy/regression gate — no key)
        run: npm run eval -- --gate

      - name: Submission smoke static contract (zero network)
        run: npm run smoke:submission -- --check

  # Stage 2b-db — adversarial production-bootstrap proof against real PostgreSQL.
  # The bootstrap/admin DSN exists only in this one-shot job. Beyond a clean-path
  # run, this job seeds hostile table/sequence grants, snapshots the neighbouring
  # Memory ACLs, and forces a late transactional failure after role/database
  # mutations. The assertions prove least privilege, neighbour non-interference,
  # rollback, recovery, required schema-mode selection (first=1/redeploy=0), and
  # redeploy idempotency instead of only fresh-cluster success.
  database-isolation:
    needs: secret-scan
    runs-on: ubuntu-24.04
    env:
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DATABASE_URL: postgresql://autopilot_app:ci_only_autopilot_app_password_2026_48chars@localhost:5432/autopilot
      AUTOPILOT_APP_DB_PASSWORD: ci_only_autopilot_app_password_2026_48chars
      MEMORY_DATABASE_NAME: memoryagent
    services:
      pgvector:
        image: pgvector/pgvector:0.8.5-pg16-bookworm@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Adversarial bootstrap, least-privilege, rollback, and recovery proof
        env:
          # The test itself also requires CI=true and localhost-only DSNs before
          # it permits any role/database mutation.
          CI: "true"
          AUTOPILOT_EPHEMERAL_DB_PROOF: localhost-disposable-cluster
        run: node tests/deploy/database-bootstrap-adversarial.mjs

  # Stage 2c-docs — documentation-drift fitness functions. A DISTINCT job so it shows
  # as its own check: it asserts the README's claims (model ids, HTTP endpoints, the
  # 4 agent-safe MCP tools + 9 custom skills, the security invariant that the model tool catalog
  # excludes the human terminal actions) against the live code + a committed golden,
  # and pins the headline eval numbers. Fully offline (no key, no DB, no browser).
  docs-consistency:
    needs: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Docs-consistency fitness functions (offline — no key, no DB)
        run: npm run test:docs

  # Stage 2c-pentest — the application-security PEN-TEST layer. A DISTINCT job so the
  # security posture shows as its own required check. It drives the REAL agent + REAL
  # terminal sinks (mock transports) through the full app-sec surface: excessive-agency
  # / tool-attack (the model can never reach an execution verb), prompt injection
  # (direct + indirect/poisoned-memory), authz / HITL-bypass (no sink without a human
  # approval of the exact args; amended args are what execute), sensitive-data exposure
  # (no secrets in reasoning/trace/logs), and injection into the sinks (SMTP CRLF header
  # injection + ledger JSONL format injection). The SCA/CVE category is covered by the
  # dep-audit job above (the dependency gate). Fully OFFLINE — no key, no DB, no network.
  pen-test:
    needs: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Pen-test suite (offline — real agent + sinks, mock transports)
        run: npm run test:pentest

  # Stage 2c-readiness — the machine-checkable READINESS GATE. A DISTINCT job so it shows
  # as its own check: it encodes the Track-4 rubric (Technical 30 / Innovation 30 /
  # Problem 25 / Presentation 15) as REAL behavioral checks against the live code (runs
  # the eval, measures the learning delta, drives an injection through the agent, invokes
  # both real sinks through their transport seams, verifies the docs/video/diagram
  # surface). It FAILS the build if automatable completion drops below 95%, and emits
  # readiness.json (uploaded as an artifact). Fully OFFLINE (no key, no DB, no browser).
  readiness:
    needs: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # the gate reads `git ls-files` for the tracked-mp4 allowlist
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Readiness gate (weighted rubric; fails below 95% automatable — offline)
        run: npm run readiness
      - name: Upload readiness.json
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: readiness-report
          path: readiness.json
          if-no-files-found: warn

  # Stage 2c — code-coverage measurement + gate. Runs the FULL node:test pyramid
  # (unit + integration) under c8 against a real pgvector service container, so the
  # DB seams (db/client.ts + the Pg stores) and the MCP stdio transport are measured
  # for real, not just the in-memory doubles. Fails the build if src/ coverage drops
  # below the 80% floor on statements/branches/functions/lines. Fully OFFLINE (no key).
  # (The Playwright e2e is NOT run under c8 — it drives a browser against a separate
  # server process, which c8 cannot instrument across that boundary; it is its own job.)
  coverage:
    needs: secret-scan
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    services:
      pgvector:
        image: pgvector/pgvector:0.8.5-pg16-bookworm@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # The full coverage pyramid includes the ancestry-bound evidence tests.
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Apply schema (agent_memory vector(1024) + ap_workitems)
        run: npm run db:schema
      - name: Coverage gate (full pyramid under c8; fails below the 80% src/ floor)
        run: npm run coverage
      - name: Upload lcov coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

  # Stage 2d — browser e2e. Drives the REAL served approval UI (src/ui.html) in a
  # headless Chromium against a locally-started server with the offline Fakes (no
  # DASHSCOPE key, no DATABASE_URL → in-memory stores). These catch the browser-only
  # upload-UX regressions (dead file handler, missing filename, hidden step stream)
  # that the node:test pyramid cannot see. No live Qwen, no database.
  e2e:
    needs: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Install Playwright Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium
      - name: Browser e2e (offline Fakes — no key, no DB)
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
