name: CodeQL

# GitHub-native SAST for the JavaScript/TypeScript application surface. The
# security-and-quality suite is intentionally broader than the default suite.
# The retained post-processed SARIF is parsed locally and the workflow fails on
# security-severity >= 7.0 with no allowlist. A green dated run proves only that
# this pinned analysis and gate completed; it is not a security certification.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "19 4 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # The release gate must analyze the complete submitted JavaScript/TypeScript
    # source on PRs as well as main. CodeQL Action v3.37 otherwise enables
    # diff-informed queries by default and can restrict alerts to changed ranges.
    env:
      CODEQL_ACTION_DIFF_INFORMED_QUERIES: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Initialize CodeQL (security-and-quality)
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Install the lockfile-exact dependency graph
        run: npm ci --ignore-scripts

      - name: Compile the analyzed TypeScript revision
        run: npm run --ignore-scripts build

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:javascript-typescript
          output: .artifacts/codeql/raw
          post-processed-sarif-path: .artifacts/codeql/post-processed
          upload: always

      - name: Gate CodeQL high and critical SARIF results
        id: codeql_severity_gate
        env:
          CODEQL_RAW_SARIF: ${{ steps.analyze.outputs.sarif-output }}
        run: |
          test "$CODEQL_ACTION_DIFF_INFORMED_QUERIES" = "false"
          test -n "$CODEQL_RAW_SARIF"
          node dist/scripts/codeql-sarif-gate.js \
            --input .artifacts/codeql/post-processed \
            --summary .artifacts/codeql/codeql-gate-summary.json \
            --threshold 7.0

      - name: Retain raw and post-processed CodeQL SARIF evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-sarif-${{ github.sha }}
          path: |
            .artifacts/codeql/raw
            .artifacts/codeql/post-processed
            .artifacts/codeql/codeql-gate-summary.json
          if-no-files-found: error
          retention-days: 30
