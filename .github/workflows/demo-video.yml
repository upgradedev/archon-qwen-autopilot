name: Generate Demo Video

# ~3-minute NARRATED demo video for the Global AI Hackathon (Qwen Cloud) —
# Archon Autopilot (Track 4). No local recording needed:
#   1. The multi-step-loop scene is driven by REAL captured live traces
#      (demo/video/assets/live_intake_*.json) taken from the deployed Alibaba Cloud
#      box over HTTPS — including live_intake_attack.json, a REAL captured response to
#      a prompt-injection attack (the multi-step-tool-attack DEFENSE scene). The
#      human-gate scene embeds real screenshots of the live approval UI
#      (demo/video/assets/ui_*.png). All committed, so the build is fully reproducible
#      and needs no live box or browser at render time.
#   2. scripts/build_video.py is the PER-BEAT audio-locked orchestrator: each beat
#      carries its own narration line; the voiceover for that line is synthesized
#      (ElevenLabs when ELEVEN_LABS_KEY is set — else the free edge-tts fallback, one
#      consistent voice), MEASURED, snapped to whole frames, and the beat's VIDEO
#      duration is set to exactly that length. Audio and video for every beat (and
#      every "Step N") are built from the SAME number, so they are frame-aligned with
#      NO drift — the sync bug is gone at the root.
#   3. It renders the per-scene slideshow (PIL frames, burned auto-fit captions, NO
#      black lead-in) and muxes the voiceover from t=0 -> archon-autopilot-demo.mp4.
#      A global guard asserts video == audio == sum(durations) within one frame.
#
# Run: Actions -> "Generate Demo Video" -> Run workflow  (or gh workflow run demo-video.yml).
on:
  workflow_dispatch:
    inputs:
      voice_id:
        description: "ElevenLabs voice ID."
        required: false
        default: "pNInz6obpgDQGcFmaJgB"
      model_id:
        description: "ElevenLabs model ID."
        required: false
        default: "eleven_multilingual_v2"

permissions:
  contents: read

jobs:
  video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure ffmpeg + fonts + Pillow + edge-tts
        run: |
          set -euo pipefail
          command -v ffmpeg >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
          dpkg -s fonts-dejavu-core >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y fonts-dejavu-core)
          test -f /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          test -f /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
          command -v jq >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y jq)
          python -m pip install --upgrade pip
          python -m pip install "pillow>=10" "edge-tts>=7"

      - name: Verify committed video assets exist
        run: |
          set -euo pipefail
          for f in demo/video/assets/live_intake_journal.json \
                   demo/video/assets/live_intake_duplicate.json \
                   demo/video/assets/live_intake_attack.json \
                   demo/video/assets/live_intake_attack_security.json \
                   demo/video/assets/ui_overview.png \
                   demo/video/assets/ui_card.png; do
            test -s "$f" || { echo "::error::missing asset $f"; exit 1; }
          done

      - name: Build the narrated video (per-beat audio-locked, ElevenLabs -> edge-tts)
        env:
          XI_API_KEY: ${{ secrets.ELEVEN_LABS_KEY }}
          VOICE_ID: ${{ github.event.inputs.voice_id }}
          MODEL_ID: ${{ github.event.inputs.model_id }}
          FONT_SANS: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
          FONT_SANS_BOLD: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          FONT_MONO: /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
          OUTPUT: demo/video/final/archon-autopilot-demo.mp4
        run: |
          set -euo pipefail
          # One orchestrator: per-beat TTS (ElevenLabs when the key is set, else the
          # free edge-tts fallback — always narrated), each beat's VIDEO duration set
          # to its MEASURED narration length so audio and video are frame-aligned with
          # zero drift, then muxed from t=0. build_video.py's own global guard asserts
          # video == audio == sum(durations) within one frame and duration <= 180s.
          python scripts/build_video.py
          test -s demo/video/final/archon-autopilot-demo.mp4
          test -s voiceover.mp3
          DUR=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 demo/video/final/archon-autopilot-demo.mp4)
          python3 -c "d=float('${DUR}'); assert 30 < d <= 180, f'duration {d}s out of range'; print(f'final duration OK: {d}s')"

      - name: Upload demo video
        uses: actions/upload-artifact@v4
        with:
          name: archon-autopilot-demo-video
          path: |
            demo/video/final/archon-autopilot-demo.mp4
            voiceover.mp3
            scenes.mp4
          if-no-files-found: error
          retention-days: 14
