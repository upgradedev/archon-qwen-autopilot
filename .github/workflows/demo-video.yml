name: Generate Demo Video

# <3-minute narrated or rights-safe caption-only video for Archon Autopilot (Track 4).
# The workflow is intentionally manual and fail-closed: it requires the reviewed,
# sanitized final captures under demo/final-media. Historical assets under
# demo/video/assets are never accepted as submission evidence.
#   2. scripts/build_video.py is the per-beat orchestrator. Narrated mode retains the
#      measured rights-attested TTS path. CAPTION_ONLY=true instead locks the reviewed
#      168-second/30-fps windows, invokes no TTS or third-party music, and generates
#      digital silence locally. Both modes build video/SRT from the same frame counts.
#   3. It renders the per-scene slideshow (PIL frames, burned auto-fit captions, NO
#      black lead-in) and muxes the voiceover from t=0 ->
#      demo/final-media/autopilot-demo.mp4.
#      A global guard asserts video == audio == sum(durations) within one frame.
#
# Run: Actions -> "Generate Demo Video" -> Run workflow  (or gh workflow run demo-video.yml).
on:
  workflow_dispatch:
    inputs:
      voice_id:
        description: "ElevenLabs voice ID."
        required: false
        default: "pNInz6obpgDQGcFmaJgB"
      model_id:
        description: "ElevenLabs model ID."
        required: false
        default: "eleven_multilingual_v2"
      public_app_url:
        description: "Final public HTTPS Autopilot URL shown on the end card."
        required: true
      video_model_label:
        description: "Verified promoted model IDs, for example: qwen-plus · qwen-vl-max."
        required: true
      promotion_evidence:
        description: "Repo-relative promotion-pass JSON; required only when showing qwen3.7."
        required: false
      caption_only:
        description: "Rights-safe path: no TTS/music, fixed captions + SRT, local silence."
        required: true
        type: boolean
        default: false
      voice_rights_attested:
        description: "Narrated mode only: selected voice is authorized for public competition use."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  video:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: demo/video/requirements.lock

      - name: Ensure ffmpeg + fonts + hash-locked Python dependencies
        run: |
          set -euo pipefail
          command -v ffmpeg >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
          dpkg -s fonts-dejavu-core >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y fonts-dejavu-core)
          test -f /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          test -f /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
          command -v jq >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y jq)
          python -m pip install --disable-pip-version-check --require-hashes --only-binary=:all: -r demo/video/requirements.lock
          python -m pip check

      - name: Verify sanitized final captures exist
        run: |
          set -euo pipefail
          for f in demo/final-media/judge-architecture.jpg \
                   demo/final-media/autopilot-live-intake-pending.png \
                   demo/final-media/autopilot-human-amend-diff.png \
                   demo/final-media/autopilot-correction-learning.png \
                   demo/final-media/autopilot-security-pending.png \
                   demo/final-media/autopilot-alibaba-proof.png; do
            test -s "$f" || { echo "::error::missing asset $f"; exit 1; }
          done

      - name: Build the rights-attested narrated video
        if: ${{ !inputs.caption_only }}
        env:
          XI_API_KEY: ${{ secrets.ELEVEN_LABS_KEY }}
          VOICE_ID: ${{ github.event.inputs.voice_id }}
          MODEL_ID: ${{ github.event.inputs.model_id }}
          FONT_SANS: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
          FONT_SANS_BOLD: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          FONT_MONO: /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
          ASSETS_DIR: demo/final-media
          PUBLIC_APP_URL: ${{ github.event.inputs.public_app_url }}
          VIDEO_MODEL_LABEL: ${{ github.event.inputs.video_model_label }}
          VIDEO_PROMOTION_EVIDENCE: ${{ github.event.inputs.promotion_evidence }}
          VOICE_RIGHTS_ATTESTED: ${{ github.event.inputs.voice_rights_attested }}
          OUTPUT: demo/final-media/autopilot-demo.mp4
          VOICE_MP3: .artifacts/video-build/voiceover.mp3
        run: |
          set -euo pipefail
          # One orchestrator: per-beat TTS (ElevenLabs when the key is set, else the
          # rights-attested edge-tts fallback — always narrated), each beat's VIDEO duration set
          # to its MEASURED narration length so audio and video are frame-aligned with
          # zero drift, then muxed from t=0. build_video.py's own global guard asserts
          # video == audio == sum(durations) within one frame and duration <175s.
          python scripts/build_video.py
          test -s demo/final-media/autopilot-demo.mp4
          test -s .artifacts/video-build/voiceover.mp3
          DUR=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 demo/final-media/autopilot-demo.mp4)
          python3 -c "d=float('${DUR}'); assert 30 < d < 175, f'duration {d}s out of range'; print(f'final duration OK: {d}s')"

      - name: Build the rights-safe caption-only video
        if: ${{ inputs.caption_only }}
        env:
          CAPTION_ONLY: "true"
          FONT_SANS: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
          FONT_SANS_BOLD: /usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          FONT_MONO: /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
          ASSETS_DIR: demo/final-media
          PUBLIC_APP_URL: ${{ github.event.inputs.public_app_url }}
          VIDEO_MODEL_LABEL: ${{ github.event.inputs.video_model_label }}
          VIDEO_PROMOTION_EVIDENCE: ${{ github.event.inputs.promotion_evidence }}
          OUTPUT: demo/final-media/autopilot-demo.mp4
          SRT_OUTPUT: demo/final-media/autopilot-demo.en.srt
          CAPTION_MANIFEST_OUTPUT: demo/final-media/autopilot-demo.caption-only.json
          WORKDIR: .artifacts/video-build
        run: |
          set -euo pipefail
          python scripts/build_video.py
          test -s demo/final-media/autopilot-demo.mp4
          test -s demo/final-media/autopilot-demo.en.srt
          test -s demo/final-media/autopilot-demo.caption-only.json
          test ! -e .artifacts/video-build/voiceover.mp3
          jq -e '.mode == "caption-only"
            and .rights_profile.tts == false
            and .rights_profile.third_party_music == false
            and .beats == 9
            and .fps == 30
            and .media.video.width == 1920
            and .media.video.height == 1080
            and .media.duration_seconds < 175' \
            demo/final-media/autopilot-demo.caption-only.json >/dev/null
          test "$(sha256sum demo/final-media/autopilot-demo.mp4 | cut -d' ' -f1)" = \
            "$(jq -r '.video.sha256' demo/final-media/autopilot-demo.caption-only.json)"
          test "$(sha256sum demo/final-media/autopilot-demo.en.srt | cut -d' ' -f1)" = \
            "$(jq -r '.subtitles.sidecar_sha256' demo/final-media/autopilot-demo.caption-only.json)"

      - name: Upload demo video
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: archon-autopilot-demo-video
          path: |
            demo/final-media/autopilot-demo.mp4
            .artifacts/video-build/voiceover.mp3
            demo/final-media/autopilot-demo.en.srt
            demo/final-media/autopilot-demo.caption-only.json
          if-no-files-found: error
          retention-days: 14
