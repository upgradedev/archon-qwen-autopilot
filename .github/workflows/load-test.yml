name: Load Test (k6)

# k6 load / performance test — the LOAD tier of the testing pyramid.
#
# MANUAL ONLY (workflow_dispatch). It is deliberately NOT wired to push / PR: it
# needs the k6 binary and a running server, and load-testing on every commit is
# waste. It boots the OFFLINE Autopilot server (no DASHSCOPE_API_KEY → the
# deterministic Fakes, no DATABASE_URL → in-memory stores) with a high daily
# upload cap so POST /intake (the main workflow endpoint) is actually exercised
# under load rather than immediately rate-limited — with ZERO spend and no
# side-effects (intake only proposes; nothing executes).
#
# Run: Actions -> "Load Test (k6)" -> Run workflow  (or gh workflow run load-test.yml).

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to load-test. Leave blank to boot + test the offline server locally."
        required: false
        default: ""
      run_ramp:
        description: "Run the 0->20->50->0 ramp scenario after the smoke. Default true."
        required: false
        default: "true"
        type: boolean
      intake_ratio:
        description: "Share of iterations that POST /intake (0..1). Default 0.3."
        required: false
        default: "0.3"

permissions:
  contents: read

jobs:
  load:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          cache: npm

      - name: Install deps
        run: npm ci

      # Exact official Grafana release artifact; the committed digest was verified
      # against k6-v2.1.0-checksums.txt from the same signed GitHub release.
      # Everything stays in the repository's ignored .artifacts directory.
      - name: Install k6 v2.1.0 (SHA-256 verified)
        run: |
          set -euo pipefail
          K6_VERSION="2.1.0"
          K6_SHA256="295d961ebfca306f295f1133068dcd403a8171c87f387928f5f30b0fbcff858a"
          K6_DIR="$PWD/.artifacts/k6"
          K6_ARCHIVE="$K6_DIR/k6-v${K6_VERSION}-linux-amd64.tar.gz"
          mkdir -p "$K6_DIR"
          curl --fail --silent --show-error --location \
            --output "$K6_ARCHIVE" \
            "https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz"
          echo "$K6_SHA256  $K6_ARCHIVE" | sha256sum --check --strict
          tar -xzf "$K6_ARCHIVE" --strip-components=1 -C "$K6_DIR" \
            "k6-v${K6_VERSION}-linux-amd64/k6"
          chmod 0755 "$K6_DIR/k6"
          echo "$K6_DIR" >> "$GITHUB_PATH"
          export PATH="$K6_DIR:$PATH"
          "$K6_DIR/k6" version
          k6 version

      # Boot the OFFLINE server only when no external base_url was supplied. Fakes +
      # in-memory stores + a high daily cap → real load, zero spend, no side-effects.
      - name: Start offline server (when no base_url given)
        if: ${{ github.event.inputs.base_url == '' }}
        env:
          DASHSCOPE_API_KEY: ""
          DATABASE_URL: ""
          # The isolated Fake-Qwen ramp must exercise the loop, not the production
          # abuse controls. These values are finite and equal to/below code bounds.
          UPLOAD_DAILY_LIMIT: "1000000"
          UPLOAD_GLOBAL_DAILY_LIMIT: "1000000"
          REVIEWER_UPLOAD_DAILY_LIMIT: "1000000"
          REVIEWER_UPLOAD_GLOBAL_DAILY_LIMIT: "1000000"
          HTTP_REQUESTS_PER_MINUTE: "10000"
          REVIEWER_HTTP_REQUESTS_PER_MINUTE: "20000"
          HTTP_GLOBAL_REQUESTS_PER_MINUTE: "100000"
          PORT: "9000"
          REVIEWER_TOKEN: "ci_load_only_reviewer_token_2026_not_a_secret"
        run: |
          set -euo pipefail
          mkdir -p .artifacts/load-test
          nohup npm start > .artifacts/load-test/server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for liveness (up to ~60s).
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/health >/dev/null 2>&1; then
              echo "server is up"; break
            fi
            sleep 1
          done
          curl -fsS http://localhost:9000/health

      - name: Run k6 load test
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          RUN_RAMP: ${{ github.event.inputs.run_ramp }}
          INTAKE_RATIO: ${{ github.event.inputs.intake_ratio }}
          K6_SUMMARY_PATH: .artifacts/load-test/load-summary.json
          K6_REVIEWER_TOKEN: ${{ github.event.inputs.base_url == '' && 'ci_load_only_reviewer_token_2026_not_a_secret' || secrets.LOAD_TEST_REVIEWER_TOKEN }}
          REQUIRE_INTAKE_ACCEPTED: ${{ github.event.inputs.base_url == '' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts/load-test
          TARGET="${BASE_URL:-http://localhost:9000}"
          echo "Target: ${TARGET}  |  RUN_RAMP=${RUN_RAMP}  |  INTAKE_RATIO=${INTAKE_RATIO}"
          BASE_URL="${TARGET}" k6 run load/workflow-load.js

      - name: Stop offline server
        if: ${{ always() && env.SERVER_PID != '' }}
        run: kill "${SERVER_PID}" 2>/dev/null || true

      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k6-load-summary
          path: .artifacts/load-test/load-summary.json
          if-no-files-found: warn
          retention-days: 14
