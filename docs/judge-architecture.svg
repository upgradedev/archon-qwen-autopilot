<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Archon Autopilot system architecture</title>
  <desc id="desc">A left-to-right architecture for Archon Autopilot. Untrusted invoices cross a deterministic intake boundary, Qwen vision extracts structured evidence, and a bounded qwen-plus tool loop can only read, analyze, and draft a proposal. Public callers receive an isolated redacted preview while authenticated reviewers receive a durable pending proposal. The model stops before the consequence boundary. A human approves, amends, or rejects exact arguments before fenced adapters can execute. PostgreSQL and pgvector retain approved outcomes, evidence, and corrections for later read-only recall.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#080b12"/>
      <stop offset="0.55" stop-color="#0d1322"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="agentFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102a43"/>
      <stop offset="1" stop-color="#171f46"/>
    </linearGradient>
    <linearGradient id="humanFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102b25"/>
      <stop offset="1" stop-color="#123044"/>
    </linearGradient>
    <linearGradient id="sinkFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2b2412"/>
      <stop offset="1" stop-color="#272033"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#94a3b8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#a78bfa"/>
    </marker>
    <style>
      .h1{font:750 43px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#f8fafc}
      .subtitle{font:400 18px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#a8b3c7}
      .eyebrow{font:750 13px system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:1.35px;fill:#93c5fd}
      .cardTitle{font:720 22px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#f8fafc}
      .body{font:400 15px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#d2d9e6}
      .small{font:400 13.5px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#99a6bc}
      .mono{font:620 13.5px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#7dd3fc}
      .step{font:750 12px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#06111d}
      .pillText{font:650 12.5px system-ui,-apple-system,"Segoe UI",sans-serif;fill:#cbd5e1}
      .card{fill:#141a27;stroke:#334155;stroke-width:1.8}
      .flow{fill:none;stroke:#67e8f9;stroke-width:3.5;marker-end:url(#arrow)}
      .humanFlow{fill:none;stroke:#4ade80;stroke-width:3.5;marker-end:url(#arrowGreen)}
      .feedback{fill:none;stroke:#a78bfa;stroke-width:3.2;marker-end:url(#arrowPurple)}
    </style>
  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#background)"/>
  <rect width="1600" height="900" rx="28" fill="url(#grid)"/>
  <circle cx="1450" cy="-80" r="340" fill="#7c3aed" opacity="0.08"/>
  <circle cx="75" cy="825" r="260" fill="#0891b2" opacity="0.06"/>

  <text x="64" y="68" class="h1">Archon Autopilot</text>
  <text x="64" y="104" class="subtitle">Qwen proposes. Deterministic controls constrain. A human authorizes every consequence.</text>
  <rect x="1268" y="45" width="268" height="54" rx="27" fill="url(#brand)"/>
  <text x="1402" y="79" text-anchor="middle" class="cardTitle" style="font-size:17px">Alibaba ECS · HTTPS</text>

  <text x="64" y="151" class="eyebrow">EVIDENCE → PROPOSAL</text>
  <line x1="224" y1="146" x2="1536" y2="146" stroke="#334155" stroke-width="1"/>

  <!-- 01 Intake -->
  <rect class="card" x="64" y="181" width="236" height="322" rx="22"/>
  <circle cx="96" cy="215" r="16" fill="#67e8f9"/><text x="96" y="220" text-anchor="middle" class="step">01</text>
  <text x="124" y="220" class="eyebrow">TRUST EDGE</text>
  <text x="88" y="266" class="cardTitle">Invoice intake</text>
  <text x="88" y="299" class="body">PDF · image · JSON</text>
  <text x="88" y="329" class="small">type · size · magic bytes</text>
  <text x="88" y="354" class="small">normalize with explicit notes</text>
  <rect x="88" y="390" width="188" height="42" rx="12" fill="#0f2532" stroke="#155e75"/>
  <text x="182" y="416" text-anchor="middle" class="pillText">UNTRUSTED DATA</text>
  <text x="88" y="465" class="small">Prompt-injection patterns</text>
  <text x="88" y="487" class="small">warn; structural gates enforce</text>

  <!-- 02 Extract -->
  <rect class="card" x="332" y="181" width="236" height="322" rx="22"/>
  <circle cx="364" cy="215" r="16" fill="#67e8f9"/><text x="364" y="220" text-anchor="middle" class="step">02</text>
  <text x="392" y="220" class="eyebrow">DASHSCOPE</text>
  <text x="356" y="266" class="cardTitle">Qwen vision</text>
  <text x="356" y="299" class="mono">qwen-vl-max</text>
  <text x="356" y="329" class="small">structured fields</text>
  <text x="356" y="354" class="small">source-linked evidence</text>
  <text x="356" y="379" class="small">confidence + review guard</text>
  <rect x="356" y="414" width="188" height="48" rx="12" fill="#121f34" stroke="#334155"/>
  <text x="450" y="435" text-anchor="middle" class="pillText">EXTRACTS</text>
  <text x="450" y="452" text-anchor="middle" class="small">never authorizes</text>

  <!-- 03 Agent -->
  <rect x="600" y="165" width="370" height="354" rx="24" fill="url(#agentFill)" stroke="#38bdf8" stroke-width="2.5" filter="url(#softGlow)"/>
  <circle cx="634" cy="205" r="16" fill="#67e8f9"/><text x="634" y="210" text-anchor="middle" class="step">03</text>
  <text x="662" y="210" class="eyebrow">BOUNDED QWEN LOOP</text>
  <text x="628" y="257" class="cardTitle">qwen-plus function calling</text>
  <text x="628" y="291" class="small">read + analyze only · capped steps · deadline</text>
  <rect x="628" y="323" width="148" height="38" rx="11" fill="#0e293f" stroke="#1e7493"/>
  <text x="702" y="347" text-anchor="middle" class="mono">recall history</text>
  <rect x="792" y="323" width="150" height="38" rx="11" fill="#0e293f" stroke="#1e7493"/>
  <text x="867" y="347" text-anchor="middle" class="mono">validate invoice</text>
  <rect x="628" y="373" width="148" height="38" rx="11" fill="#0e293f" stroke="#1e7493"/>
  <text x="702" y="397" text-anchor="middle" class="mono">check duplicate</text>
  <rect x="792" y="373" width="150" height="38" rx="11" fill="#0e293f" stroke="#1e7493"/>
  <text x="867" y="397" text-anchor="middle" class="mono">compute variance</text>
  <rect x="628" y="443" width="314" height="48" rx="13" fill="#251b45" stroke="#8b5cf6"/>
  <text x="785" y="463" text-anchor="middle" class="pillText">OUTPUT</text>
  <text x="785" y="482" text-anchor="middle" class="body">one proposal · never execution</text>

  <!-- Model stop / consequence boundary -->
  <line x1="990" y1="166" x2="990" y2="521" stroke="#fb7185" stroke-width="2" stroke-dasharray="7 8"/>
  <rect x="925" y="131" width="130" height="28" rx="14" fill="#3a1823" stroke="#fb7185"/>
  <text x="990" y="150" text-anchor="middle" style="font:750 11.5px system-ui,sans-serif;letter-spacing:1px;fill:#fda4af">MODEL STOPS</text>

  <!-- 04 Human review -->
  <rect x="1022" y="181" width="246" height="322" rx="22" fill="url(#humanFill)" stroke="#22c55e" stroke-width="2.2"/>
  <circle cx="1054" cy="215" r="16" fill="#4ade80"/><text x="1054" y="220" text-anchor="middle" class="step">04</text>
  <text x="1082" y="220" class="eyebrow" style="fill:#86efac">HUMAN CONTROL</text>
  <text x="1046" y="266" class="cardTitle">Exact-args gate</text>
  <text x="1046" y="302" class="body">Approve</text>
  <text x="1046" y="333" class="body">Amend</text>
  <text x="1046" y="364" class="body">Reject</text>
  <rect x="1046" y="401" width="198" height="62" rx="13" fill="#10241f" stroke="#2f855a"/>
  <text x="1145" y="425" text-anchor="middle" class="pillText">AUTHENTICATED</text>
  <text x="1145" y="449" text-anchor="middle" class="small">atomic claim + audit trail</text>

  <!-- 05 Execute -->
  <rect x="1300" y="181" width="236" height="322" rx="22" fill="url(#sinkFill)" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="1332" cy="215" r="16" fill="#fbbf24"/><text x="1332" y="220" text-anchor="middle" class="step">05</text>
  <text x="1360" y="220" class="eyebrow" style="fill:#fbbf24">FENCED ADAPTERS</text>
  <text x="1324" y="266" class="cardTitle">After approval</text>
  <text x="1324" y="301" class="body">JSONL ledger</text>
  <text x="1324" y="331" class="body">SMTP reply</text>
  <text x="1324" y="361" class="small">durable ref dedupe</text>
  <text x="1324" y="386" class="small">explicit delivery recovery</text>
  <rect x="1324" y="421" width="188" height="48" rx="12" fill="#2c2130" stroke="#7c3aed"/>
  <text x="1418" y="441" text-anchor="middle" class="pillText">PAYMENT + REVIEW</text>
  <text x="1418" y="459" text-anchor="middle" class="small">simulated adapters</text>

  <path class="flow" d="M300 342H321"/>
  <path class="flow" d="M568 342H589"/>
  <path class="humanFlow" d="M970 342H1011"/>
  <path class="humanFlow" d="M1268 342H1289"/>

  <!-- Durable evidence plane -->
  <text x="64" y="586" class="eyebrow">DURABLE EVIDENCE + FEEDBACK</text>
  <line x1="286" y1="581" x2="1536" y2="581" stroke="#334155" stroke-width="1"/>

  <rect class="card" x="64" y="617" width="352" height="142" rx="20"/>
  <text x="92" y="653" class="eyebrow">PUBLIC / REVIEWER SPLIT</text>
  <text x="92" y="690" class="cardTitle">Preview or PENDING</text>
  <text x="92" y="720" class="small">public: isolated · redacted · non-durable</text>
  <text x="92" y="744" class="small">reviewer: full trace · durable proposal</text>

  <rect x="454" y="617" width="444" height="142" rx="20" fill="#171833" stroke="#8b5cf6" stroke-width="2"/>
  <text x="482" y="653" class="eyebrow">POSTGRESQL + PGVECTOR</text>
  <text x="482" y="690" class="cardTitle">Vendor evidence memory</text>
  <text x="482" y="720" class="body">approved outcomes · corrections · rejections</text>
  <text x="482" y="744" class="small">tenant-scoped recall · source-linked trace</text>

  <rect class="card" x="936" y="617" width="600" height="142" rx="20"/>
  <text x="964" y="653" class="eyebrow">AUDIT + LEARNING LOOP</text>
  <text x="964" y="690" class="cardTitle">Executed arguments become future evidence</text>
  <text x="964" y="720" class="body">approved args = executed args · human corrections inform later proposals</text>
  <text x="964" y="744" class="small">the model reads history; code owns state transitions and side effects</text>

  <path d="M1145 503V548C1145 577 315 578 256 607" class="feedback"/>
  <path d="M1418 503V560C1418 590 1300 592 1252 607" class="humanFlow"/>
  <path class="feedback" d="M936 688H909"/>
  <path d="M612 617C615 566 714 552 746 519" class="feedback"/>

  <!-- Structural invariant -->
  <rect x="64" y="802" width="1472" height="58" rx="17" fill="#2a1720" stroke="#fb7185" stroke-width="1.8"/>
  <circle cx="92" cy="831" r="10" fill="#fb7185"/>
  <rect x="87" y="829" width="10" height="4" rx="2" fill="#2a1720"/>
  <text x="118" y="826" style="font:750 12.5px system-ui,sans-serif;letter-spacing:1.2px;fill:#fda4af">STRUCTURAL CONSEQUENCE BOUNDARY</text>
  <text x="118" y="847" class="small">Qwen and MCP expose proposal/read tools only — no approve, amend, reject, pay, or sink-execution capability.</text>
  <rect x="1376" y="817" width="132" height="30" rx="15" fill="#4a1724" stroke="#fb7185"/>
  <text x="1442" y="837" text-anchor="middle" style="font:750 12px system-ui,sans-serif;letter-spacing:1px;fill:#fecdd3">BLOCKED</text>
</svg>
