<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archon Autopilot — Approval Queue</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2330;
      --border: #2b333f;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #2ea043;
      --green-hi: #3fb950;
      --amber: #d29922;
      --red: #da3633;
      --red-hi: #f85149;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: .2px; }
    header .sub { color: var(--muted); font-size: 13px; }
    header .spacer { flex: 1; }
    .pill {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 12px;
    }
    main { max-width: 980px; margin: 0 auto; padding: 24px 20px 80px; }
    .bar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .bar h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 0; }
    .count { font-family: var(--mono); font-size: 12px; color: var(--accent); }
    button {
      font-family: inherit;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 7px 14px;
      cursor: pointer;
      transition: background .12s ease, border-color .12s ease;
    }
    button:hover { border-color: var(--accent); }
    button:disabled { opacity: .5; cursor: default; }
    button.ghost { background: transparent; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-head {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .vendor { font-size: 16px; font-weight: 600; }
    .amount { font-family: var(--mono); font-size: 15px; color: var(--green-hi); }
    .ref { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .card-body { padding: 16px 18px; display: grid; gap: 16px; }
    .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 6px; }
    .tool {
      display: inline-block;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      background: rgba(88,166,255,.08);
      border: 1px solid rgba(88,166,255,.3);
      border-radius: 6px;
      padding: 3px 10px;
    }
    .conf { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-left: 10px; }
    .reasoning { color: var(--text); margin-top: 8px; white-space: pre-wrap; }
    .trace { display: grid; gap: 8px; }
    .trace-step { display: grid; grid-template-columns: 22px 1fr; gap: 8px; align-items: baseline; }
    .trace-step .num { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .trace-step .tool { font-family: var(--mono); font-size: 12.5px; color: var(--accent); }
    .trace-step .obs { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
    .trace-step .why { color: var(--text); font-size: 12px; opacity: .75; margin-top: 1px; }
    .stopreason { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: 10px; }
    textarea {
      width: 100%;
      min-height: 96px;
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      resize: vertical;
      line-height: 1.5;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .findings { display: grid; gap: 4px; }
    .finding { display: flex; gap: 8px; align-items: baseline; font-size: 12.5px; }
    .finding .rule { font-family: var(--mono); color: var(--muted); min-width: 26px; }
    .sev-error { color: var(--red-hi); }
    .sev-warn { color: var(--amber); }
    .sev-info { color: var(--muted); }
    .ok { color: var(--green-hi); }
    .recalled { display: grid; gap: 6px; }
    .memo { font-size: 12.5px; color: var(--muted); }
    .memo .score { font-family: var(--mono); color: var(--accent); }
    .actions { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--border); background: var(--panel-2); flex-wrap: wrap; }
    button.approve { border-color: rgba(46,160,67,.5); color: var(--green-hi); }
    button.approve:hover { background: rgba(46,160,67,.12); border-color: var(--green-hi); }
    button.amend { border-color: rgba(210,153,34,.5); color: var(--amber); }
    button.amend:hover { background: rgba(210,153,34,.12); border-color: var(--amber); }
    button.reject { border-color: rgba(218,54,51,.5); color: var(--red-hi); }
    button.reject:hover { background: rgba(218,54,51,.12); border-color: var(--red-hi); }
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; border: 1px dashed var(--border); border-radius: 10px; }
    .history { margin-top: 40px; }
    .history .row { display: flex; gap: 10px; align-items: baseline; font-size: 12.5px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .history .badge { font-family: var(--mono); font-size: 11px; padding: 1px 8px; border-radius: 999px; }
    .badge.approved { color: var(--green-hi); border: 1px solid rgba(46,160,67,.4); }
    .badge.rejected { color: var(--red-hi); border: 1px solid rgba(218,54,51,.4); }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      max-width: 80vw;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err { border-color: var(--red); }
    #toast.ok { border-color: var(--green); }
    a { color: var(--accent); }
    button.primary { border-color: var(--accent); color: var(--accent); }
    button.primary:hover { background: rgba(88,166,255,.12); }
    /* Human-gate reminder shown on every proposal (reinforces: nothing runs until you approve). */
    .gate-note { flex-basis: 100%; font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .gate-note b { color: var(--green-hi); font-weight: 600; }
    /* Empty state helper button */
    .empty .empty-msg { max-width: 520px; margin: 0 auto; }
    .empty button { margin-top: 18px; }
    /* Guided tour overlay (inline, no external dependency, no build step). */
    #tourOverlay { position: fixed; inset: 0; z-index: 60; display: none; }
    #tourOverlay.show { display: block; }
    #tourBackdrop { position: absolute; inset: 0; background: rgba(1,4,9,.72); }
    #tourHighlight {
      position: absolute; display: none; border-radius: 10px;
      border: 2px solid var(--accent);
      box-shadow: 0 0 0 4px rgba(88,166,255,.25), 0 0 0 9999px rgba(1,4,9,.72);
      transition: top .18s ease, left .18s ease, width .18s ease, height .18s ease;
      pointer-events: none;
    }
    #tourPop {
      position: absolute; max-width: 340px; z-index: 62;
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 18px; box-shadow: 0 12px 40px rgba(0,0,0,.55);
    }
    #tourPop h3 { margin: 0 0 6px; font-size: 14px; font-weight: 600; }
    #tourPop p { margin: 0 0 14px; font-size: 13px; color: var(--muted); line-height: 1.55; }
    #tourPop .nav { display: flex; align-items: center; gap: 8px; }
    #tourPop .step-count { flex: 1; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Archon Autopilot</h1>
    <span class="sub">Human-gated accounts-payable agent on Qwen — it proposes, you approve.</span>
    <span class="spacer"></span>
    <span class="pill" id="model">decider …</span>
    <button class="primary" id="loadSample" title="Queue a realistic sample vendor invoice">Load sample invoice</button>
    <button class="ghost" id="tourBtn" title="Replay the guided tour">Take the tour</button>
    <button class="ghost" id="refresh" title="Reload the queue">Refresh</button>
  </header>

  <main>
    <div class="bar">
      <h2>Pending approvals</h2>
      <span class="count" id="count"></span>
    </div>
    <div id="queue"></div>

    <div class="history" id="historyWrap" style="display:none">
      <div class="bar"><h2>Decided this session</h2></div>
      <div id="history"></div>
    </div>
  </main>

  <div id="toast"></div>

  <!-- Guided tour overlay (populated by JS). Inline spotlight + popover; no CDN, no build step. -->
  <div id="tourOverlay">
    <div id="tourBackdrop"></div>
    <div id="tourHighlight"></div>
    <div id="tourPop"></div>
  </div>

  <script>
    // Vanilla JS approval client. Same-origin: the page is served by the same
    // Fastify backend, so all fetches are relative. No framework, no build step.
    const $ = (sel, root) => (root || document).querySelector(sel);
    const el = (tag, props, kids) => {
      const n = document.createElement(tag);
      if (props) for (const k in props) {
        if (k === 'class') n.className = props[k];
        else if (k === 'text') n.textContent = props[k];
        else n.setAttribute(k, props[k]);
      }
      (kids || []).forEach((c) => n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
      return n;
    };
    const decided = []; // session-local record; the API exposes only the pending queue

    let toastTimer;
    function toast(msg, kind) {
      const t = $('#toast');
      t.textContent = msg;
      t.className = 'show ' + (kind || '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = ''; }, 3200);
    }

    function money(inv) {
      if (inv.total == null) return (inv.currency || '') + ' —';
      const n = Number(inv.total).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return (inv.currency || '') + ' ' + n;
    }

    async function api(method, path, body) {
      const res = await fetch(path, {
        method,
        headers: body ? { 'content-type': 'application/json' } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      const text = await res.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { raw: text }; }
      if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
      return data;
    }

    function renderFindings(findings) {
      const wrap = el('div', { class: 'findings' });
      (findings || []).forEach((f) => {
        const cls = f.passed ? 'ok' : ('sev-' + (f.severity || 'info'));
        wrap.appendChild(el('div', { class: 'finding' }, [
          el('span', { class: 'rule', text: f.rule || '' }),
          el('span', { class: cls, text: (f.passed ? '✓ ' : '✗ ') + (f.message || '') }),
        ]));
      });
      return wrap;
    }

    function renderTrace(trace) {
      const wrap = el('div', { class: 'trace' });
      (trace || []).forEach((t) => {
        const kids = [
          el('span', { class: 'num', text: (t.step != null ? t.step + '.' : '·') }),
        ];
        const body = el('div', {}, [
          el('div', { class: 'tool', text: t.tool || '' }),
        ]);
        if (t.observation) body.appendChild(el('div', { class: 'obs', text: '→ ' + t.observation }));
        if (t.reasoning) body.appendChild(el('div', { class: 'why', text: t.reasoning }));
        kids.push(body);
        wrap.appendChild(el('div', { class: 'trace-step' }, kids));
      });
      return wrap;
    }

    function renderRecalled(recalled) {
      const wrap = el('div', { class: 'recalled' });
      (recalled || []).forEach((r) => {
        const line = el('div', { class: 'memo' });
        line.appendChild(el('span', { class: 'score', text: '· ' + (r.kind || 'memory') + ' ' + (typeof r.score === 'number' ? r.score.toFixed(2) : '') + '  ' }));
        line.appendChild(document.createTextNode(r.content || ''));
        wrap.appendChild(line);
      });
      return wrap;
    }

    function card(item) {
      const inv = item.invoice || {};
      const p = item.proposed || {};
      const c = el('div', { class: 'card' });

      const head = el('div', { class: 'card-head' }, [
        el('span', { class: 'vendor', text: inv.vendor || 'Unknown vendor' }),
        el('span', { class: 'amount', text: money(inv) }),
        el('span', { class: 'ref', text: (inv.vendor_ref || inv.invoice_id || '') }),
      ]);

      const conf = typeof p.confidence === 'number' ? ' · confidence ' + Math.round(p.confidence * 100) + '%' : '';
      const proposed = el('div', { 'data-tour': 'proposed' }, [
        el('div', { class: 'section-label', text: 'Proposed action (Qwen)' }),
        el('span', { class: 'tool', text: p.tool || 'flag_for_review' }),
        el('span', { class: 'conf', text: (p.modelId ? p.modelId : '') + conf }),
        (item.stopReason ? el('span', { class: 'stopreason', text: 'stop: ' + item.stopReason }) : document.createTextNode('')),
        el('div', { class: 'reasoning', text: p.reasoning || '' }),
      ]);

      // Editable arguments — what a human approves is exactly what executes.
      const ta = el('textarea', { spellcheck: 'false' });
      ta.value = JSON.stringify(p.args || {}, null, 2);
      const argsBlock = el('div', {}, [
        el('div', { class: 'section-label', text: 'Action arguments — edit to amend' }),
        ta,
      ]);

      const body = el('div', { class: 'card-body' }, [proposed, argsBlock]);
      // The agent's multi-step reasoning trace — HOW it reached this proposal (the
      // autonomous read/analyze steps it took, each with no side-effect).
      if ((item.trace || []).length) {
        const n = item.trace.length;
        body.appendChild(el('div', { 'data-tour': 'trace' }, [
          el('div', { class: 'section-label', text: 'How the agent decided — ' + n + (n === 1 ? ' step' : ' steps') + ' (no side-effect)' }),
          renderTrace(item.trace),
        ]));
      }
      if ((item.findings || []).length) {
        body.appendChild(el('div', {}, [ el('div', { class: 'section-label', text: 'Validation findings' }), renderFindings(item.findings) ]));
      }
      if ((item.recalled || []).length) {
        body.appendChild(el('div', {}, [ el('div', { class: 'section-label', text: 'Recalled vendor history' }), renderRecalled(item.recalled) ]));
      }

      const approveBtn = el('button', { class: 'approve', text: 'Approve' });
      const amendBtn = el('button', { class: 'amend', text: 'Amend & approve' });
      const rejectBtn = el('button', { class: 'reject', text: 'Reject' });
      const gateNote = el('div', { class: 'gate-note' }, [
        el('b', { text: 'Nothing executes until you approve.' }),
        document.createTextNode(' You hold the gate — approve, amend, or reject.'),
      ]);
      const actions = el('div', { class: 'actions', 'data-tour': 'actions' }, [gateNote, approveBtn, amendBtn, rejectBtn]);

      const setBusy = (b) => { approveBtn.disabled = amendBtn.disabled = rejectBtn.disabled = b; };
      const remember = (status) => decided.unshift({ vendor: inv.vendor || 'vendor', ref: inv.vendor_ref || inv.invoice_id || '', tool: p.tool, status });

      approveBtn.onclick = async () => {
        setBusy(true);
        try {
          const r = await api('POST', '/approve/' + item.id);
          toast('Approved · ' + ((r.execution && r.execution.summary) || p.tool), 'ok');
          remember('approved');
          await load();
        } catch (e) { toast(e.message, 'err'); setBusy(false); }
      };

      amendBtn.onclick = async () => {
        let args;
        try { args = JSON.parse(ta.value); }
        catch (_) { toast('Arguments are not valid JSON — fix them first.', 'err'); return; }
        setBusy(true);
        try {
          const r = await api('POST', '/amend/' + item.id, { args, reason: 'Amended in the approval UI' });
          toast('Amended & approved · ' + ((r.execution && r.execution.summary) || p.tool), 'ok');
          remember('approved');
          await load();
        } catch (e) { toast(e.message, 'err'); setBusy(false); }
      };

      rejectBtn.onclick = async () => {
        setBusy(true);
        try {
          await api('POST', '/reject/' + item.id, { reason: 'Rejected in the approval UI' });
          toast('Rejected — nothing executed', 'ok');
          remember('rejected');
          await load();
        } catch (e) { toast(e.message, 'err'); setBusy(false); }
      };

      c.appendChild(head);
      c.appendChild(body);
      c.appendChild(actions);
      return c;
    }

    function renderHistory() {
      const wrap = $('#historyWrap');
      const list = $('#history');
      list.innerHTML = '';
      if (!decided.length) { wrap.style.display = 'none'; return; }
      wrap.style.display = '';
      decided.slice(0, 12).forEach((d) => {
        list.appendChild(el('div', { class: 'row' }, [
          el('span', { class: 'badge ' + d.status, text: d.status }),
          el('span', { text: d.vendor + ' ' }),
          el('span', { class: 'ref', text: d.ref }),
          el('span', { class: 'conf', text: d.tool || '' }),
        ]));
      });
    }

    async function load() {
      const queue = $('#queue');
      try {
        const data = await api('GET', '/pending');
        const items = (data && data.pending) || [];
        $('#count').textContent = items.length + (items.length === 1 ? ' item' : ' items');
        queue.innerHTML = '';
        if (!items.length) {
          const emptyBtn = el('button', { class: 'primary', text: 'Load sample invoice' });
          emptyBtn.onclick = () => loadSample();
          queue.appendChild(el('div', { class: 'empty' }, [
            el('div', { class: 'empty-msg', text: 'No invoices in the queue — click "Load sample invoice" to watch the agent recall history, run its checks, and propose an action for your approval.' }),
            emptyBtn,
          ]));
        } else {
          items.forEach((it) => queue.appendChild(card(it)));
        }
        renderHistory();
      } catch (e) {
        queue.innerHTML = '';
        queue.appendChild(el('div', { class: 'empty', text: 'Could not load the queue: ' + e.message }));
      }
    }

    async function loadHealth() {
      try {
        const h = await api('GET', '/health');
        $('#model').textContent = 'decider ' + (h.decider || '?') + ' · ' + (h.store || '');
      } catch (_) { $('#model').textContent = 'decider offline'; }
    }

    // ---- One-click demo: queue a realistic sample vendor invoice ----------------
    // Universal accounts-payable framing: a vendor bill with subtotal + tax + total
    // and one line item. Posting it runs the full intake → recall → validate →
    // Qwen-decide pipeline so a first-time visitor immediately sees a proposal.
    const SAMPLE_INVOICE = {
      vendor: 'Meridian Logistics',
      invoice_number: 'ML-2026-0417',
      invoice_date: '2026-06-30',
      currency: 'EUR',
      tax_id: 'TAX-ML-88231',
      subtotal: 5200,
      tax: 1248,
      total: 6448,
      line_items: [
        { description: 'Freight and warehousing — June', quantity: 1, unit_price: 5200, amount: 5200 },
      ],
    };

    async function loadSample() {
      const b = $('#loadSample');
      const prev = b.textContent;
      b.disabled = true; b.textContent = 'Loading…';
      try {
        await api('POST', '/intake', { invoice: SAMPLE_INVOICE });
        toast('Sample invoice queued — the agent proposed an action for your approval', 'ok');
        await load();
      } catch (e) {
        toast(e.message, 'err');
      } finally {
        b.disabled = false; b.textContent = prev;
      }
    }

    // ---- Guided tour (inline; no CDN, no build step) ----------------------------
    // Steps adapt to the DOM: the queue intro always shows; if a proposal card is
    // present its invoice / proposal / reasoning-trace / gate steps are added, else
    // the tour points the visitor at "Load sample invoice". Any step whose target
    // is missing is skipped so the spotlight never points at nothing.
    const TOUR_KEY = 'archon_autopilot_tour_v1';
    const tour = { steps: [], i: 0 };

    function tourSteps() {
      const steps = [{
        el: () => $('#queue'),
        title: 'The approval queue',
        body: 'This is Archon Autopilot — a human-gated accounts-payable agent on Qwen. Every incoming vendor invoice arrives here as a proposal. Nothing is paid or posted until you approve it.',
      }];
      const firstCard = $('#queue .card');
      if (!firstCard) {
        steps.push({
          el: () => $('#loadSample'),
          title: 'Load a sample invoice',
          body: 'The queue is empty. Click "Load sample invoice" to drop in a realistic vendor bill — the agent will recall the vendor’s history, run its checks, and propose an action for your approval.',
        });
        return steps;
      }
      steps.push({
        el: () => firstCard.querySelector('.card-head'),
        title: 'The vendor invoice',
        body: 'Each card is one invoice — vendor, amount, and reference. Messy or missing fields are normalized on intake and noted, never silently rejected.',
      });
      steps.push({
        el: () => firstCard.querySelector('[data-tour="proposed"]'),
        title: 'Qwen’s proposed action',
        body: 'The agent proposes exactly one accounts-payable action, with a confidence score and a plain-language reason. It is a proposal only — it has not run.',
      });
      if (firstCard.querySelector('[data-tour="trace"]')) {
        steps.push({
          el: () => firstCard.querySelector('[data-tour="trace"]'),
          title: 'How the agent decided',
          body: 'The multi-step reasoning trace: the agent recalls vendor history, validates the invoice, checks for a duplicate, tests the amount variance, then reaches a terminal proposal. Every step is read-only — no side effects.',
        });
      }
      steps.push({
        el: () => firstCard.querySelector('[data-tour="actions"]'),
        title: 'You hold the gate',
        body: 'Approve to execute the exact proposed action, Amend to edit the arguments first, or Reject to discard it. Nothing executes until you approve — this is the human gate.',
      });
      return steps;
    }

    function placeTour(step) {
      const hl = $('#tourHighlight'), pop = $('#tourPop'), bd = $('#tourBackdrop');
      const target = step && step.el ? step.el() : null;
      if (target && target.getBoundingClientRect) {
        target.scrollIntoView({ block: 'center' });
        const r = target.getBoundingClientRect();
        hl.style.display = 'block';
        hl.style.top = (r.top - 6) + 'px';
        hl.style.left = (r.left - 6) + 'px';
        hl.style.width = (r.width + 12) + 'px';
        hl.style.height = (r.height + 12) + 'px';
        bd.style.background = 'transparent';
        const pw = pop.offsetWidth || 340, ph = pop.offsetHeight || 170;
        let top = r.bottom + 14;
        if (top + ph > window.innerHeight - 12) top = Math.max(12, r.top - ph - 14);
        let left = r.left;
        if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
        if (left < 12) left = 12;
        pop.style.top = top + 'px';
        pop.style.left = left + 'px';
        pop.style.transform = 'none';
      } else {
        hl.style.display = 'none';
        bd.style.background = '';
        pop.style.top = '50%';
        pop.style.left = '50%';
        pop.style.transform = 'translate(-50%, -50%)';
      }
    }

    function renderTourStep() {
      const step = tour.steps[tour.i];
      if (!step) { endTour(); return; }
      const pop = $('#tourPop');
      pop.innerHTML = '';
      pop.appendChild(el('h3', { text: step.title }));
      pop.appendChild(el('p', { text: step.body }));
      const nav = el('div', { class: 'nav' });
      nav.appendChild(el('span', { class: 'step-count', text: (tour.i + 1) + ' / ' + tour.steps.length }));
      if (tour.i > 0) {
        const back = el('button', { class: 'ghost', text: 'Back' });
        back.onclick = () => { tour.i -= 1; renderTourStep(); };
        nav.appendChild(back);
      }
      const last = tour.i === tour.steps.length - 1;
      const next = el('button', { class: 'primary', text: last ? 'Done' : 'Next' });
      next.onclick = () => { if (last) { endTour(); } else { tour.i += 1; renderTourStep(); } };
      nav.appendChild(next);
      if (!last) {
        const skip = el('button', { class: 'ghost', text: 'Skip' });
        skip.onclick = endTour;
        nav.appendChild(skip);
      }
      pop.appendChild(nav);
      placeTour(step);
    }

    function startTour() {
      tour.steps = tourSteps();
      tour.i = 0;
      $('#tourOverlay').classList.add('show');
      renderTourStep();
    }

    function endTour() {
      $('#tourOverlay').classList.remove('show');
      try { localStorage.setItem(TOUR_KEY, '1'); } catch (_) {}
    }

    function maybeAutoTour() {
      let seen = false;
      try { seen = localStorage.getItem(TOUR_KEY) === '1'; } catch (_) {}
      if (!seen) startTour();
    }

    $('#refresh').onclick = load;
    $('#loadSample').onclick = () => loadSample();
    $('#tourBtn').onclick = startTour;
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && $('#tourOverlay').classList.contains('show')) endTour();
    });
    window.addEventListener('resize', () => {
      if ($('#tourOverlay').classList.contains('show')) placeTour(tour.steps[tour.i]);
    });
    loadHealth();
    load().then(maybeAutoTour);
  </script>
</body>
</html>
